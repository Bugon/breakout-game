<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#faf8ef">
<title>2048</title>
<style>
  :root {
    --bg: #faf8ef;
    --board: #bbada0;
    --cell: #cdc1b4;
    --text-dark: #776e65;
    --text-light: #f9f6f2;
    --accent: #edc22e;
    --btn: #8f7a66;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-dark);
    font-family: "Clear Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
    touch-action: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    min-height: 100%;
  }
  .wrap {
    width: 100%;
    max-width: 480px;
    padding: 14px 0 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  h1 {
    font-size: clamp(40px, 12vw, 56px);
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1;
    letter-spacing: -1px;
  }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: var(--board);
    color: #fff;
    border-radius: 8px;
    padding: 8px 14px;
    min-width: 72px;
    text-align: center;
  }
  .score-box .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #eee4da;
  }
  .score-box .value {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
  }
  .bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .bar p {
    font-size: 13px;
    flex: 1;
    line-height: 1.4;
  }
  .bar p b { color: var(--text-dark); }
  .btn {
    background: var(--btn);
    color: var(--text-light);
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: translateY(1px); }

  #board-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--board);
    border-radius: 10px;
    padding: 2.5%;
    touch-action: none;
  }
  #grid {
    position: absolute;
    inset: 2.5%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 2.5%;
  }
  .cell {
    background: var(--cell);
    border-radius: 6px;
  }
  #tiles {
    position: absolute;
    inset: 2.5%;
  }
  .tile {
    position: absolute;
    width: calc((100% - 2.5% * 3) / 4);
    height: calc((100% - 2.5% * 3) / 4);
    background: #eee4da;
    color: var(--text-dark);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 9vw;
    line-height: 1;
    transition: transform 120ms ease-in-out;
    will-change: transform;
  }
  @media (min-width: 480px) {
    .tile { font-size: 44px; }
  }
  .tile.new { animation: pop 160ms ease-out; }
  .tile.merged { animation: merge 180ms ease-out; z-index: 2; }
  @keyframes pop { 0% { transform: var(--pos) scale(0); } 100% { transform: var(--pos) scale(1); } }
  @keyframes merge {
    0% { transform: var(--pos) scale(1); }
    50% { transform: var(--pos) scale(1.15); }
    100% { transform: var(--pos) scale(1); }
  }
  .t2    { background: #eee4da; color: var(--text-dark); }
  .t4    { background: #ede0c8; color: var(--text-dark); }
  .t8    { background: #f2b179; color: var(--text-light); }
  .t16   { background: #f59563; color: var(--text-light); }
  .t32   { background: #f67c5f; color: var(--text-light); }
  .t64   { background: #f65e3b; color: var(--text-light); }
  .t128  { background: #edcf72; color: var(--text-light); font-size: 8vw; }
  .t256  { background: #edcc61; color: var(--text-light); font-size: 8vw; }
  .t512  { background: #edc850; color: var(--text-light); font-size: 8vw; }
  .t1024 { background: #edc53f; color: var(--text-light); font-size: 6.5vw; }
  .t2048 { background: #edc22e; color: var(--text-light); font-size: 6.5vw; box-shadow: 0 0 30px rgba(237,194,46,0.5); }
  .tsuper { background: #3c3a32; color: var(--text-light); font-size: 6.5vw; }
  @media (min-width: 480px) {
    .t128, .t256, .t512 { font-size: 36px; }
    .t1024, .t2048, .tsuper { font-size: 30px; }
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(238, 228, 218, 0.73);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    text-align: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  #overlay.show { opacity: 1; pointer-events: auto; }
  #overlay h2 {
    font-size: 44px;
    font-weight: 800;
    color: var(--text-dark);
  }
  #overlay.win h2 { color: var(--accent); }
  #overlay .actions { display: flex; gap: 10px; }

  footer {
    font-size: 12px;
    color: #948981;
    text-align: center;
    padding-top: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box"><div class="label">점수</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">최고</div><div class="value" id="best">0</div></div>
    </div>
  </header>
  <div class="bar">
    <p><b>숫자 타일을 합쳐 2048을 만드세요!</b><br>스와이프(또는 방향키)로 이동.</p>
    <button class="btn" id="newGame">새 게임</button>
  </div>

  <div id="board-wrap">
    <div id="grid"></div>
    <div id="tiles"></div>
    <div id="overlay">
      <h2 id="overlay-title">게임 오버!</h2>
      <div class="actions">
        <button class="btn" id="overlayAction">다시 시작</button>
        <button class="btn" id="overlayKeep" style="display:none;background:#a89584;">계속하기</button>
      </div>
    </div>
  </div>

  <footer>스와이프 · 방향키 · 스페이스로 새 게임</footer>
</div>

<script>
(() => {
  const SIZE = 4;
  const STORAGE_KEY = '2048.best';
  const STATE_KEY = '2048.state';
  const gridEl = document.getElementById('grid');
  const tilesEl = document.getElementById('tiles');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayAction = document.getElementById('overlayAction');
  const overlayKeep = document.getElementById('overlayKeep');
  const newGameBtn = document.getElementById('newGame');

  // Build background cells
  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    gridEl.appendChild(c);
  }

  let board = [];       // 4x4 array of tile objects or null
  let nextId = 1;
  let score = 0;
  let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
  let won = false;
  let keepPlaying = false;
  let tileEls = new Map(); // id -> DOM element

  bestEl.textContent = best;

  function emptyBoard() {
    const b = [];
    for (let r = 0; r < SIZE; r++) { b.push([null, null, null, null]); }
    return b;
  }

  function emptyCells() {
    const out = [];
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!board[r][c]) out.push([r, c]);
    return out;
  }

  function addRandomTile() {
    const cells = emptyCells();
    if (!cells.length) return;
    const [r, c] = cells[Math.floor(Math.random() * cells.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    board[r][c] = { id: nextId++, value, r, c, isNew: true };
  }

  function tileClass(v) {
    if (v <= 2048) return 't' + v;
    return 'tsuper';
  }

  function render() {
    const activeIds = new Set();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const t = board[r][c];
        if (!t) continue;
        activeIds.add(t.id);
        let el = tileEls.get(t.id);
        const posX = c * (100 + (100 / 39)) / 4; // px not used; using percent transforms instead
        // Use percent-based transform
        const step = 100 / 4;
        const gap = 2.5; // percent of parent width
        const tx = c * (100 / 4);
        const ty = r * (100 / 4);
        // More accurate: each cell is (100 - gap*3)/4 wide; positions include gaps
        const cellPct = (100 - gap * 3) / 4;
        const x = c * (cellPct + gap);
        const y = r * (cellPct + gap);
        const transform = `translate(${x}%, ${y}%)`;

        if (!el) {
          el = document.createElement('div');
          el.className = 'tile ' + tileClass(t.value);
          el.style.setProperty('--pos', transform);
          el.style.transform = transform;
          el.textContent = t.value;
          if (t.isNew) el.classList.add('new');
          tilesEl.appendChild(el);
          tileEls.set(t.id, el);
        } else {
          el.className = 'tile ' + tileClass(t.value);
          el.style.setProperty('--pos', transform);
          el.style.transform = transform;
          el.textContent = t.value;
          if (t.merged) {
            el.classList.remove('merged');
            // force reflow to restart animation
            void el.offsetWidth;
            el.classList.add('merged');
          }
        }
        t.isNew = false;
        t.merged = false;
      }
    }
    // Remove gone tiles
    for (const [id, el] of tileEls) {
      if (!activeIds.has(id)) {
        el.remove();
        tileEls.delete(id);
      }
    }
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem(STORAGE_KEY, best);
    }
  }

  function cloneRow(row) { return row.map(t => t); }

  function slide(dir) {
    // dir: 'left' | 'right' | 'up' | 'down'
    let moved = false;
    let gained = 0;

    const lines = [];
    if (dir === 'left' || dir === 'right') {
      for (let r = 0; r < SIZE; r++) lines.push(board[r]);
    } else {
      for (let c = 0; c < SIZE; c++) {
        const col = [];
        for (let r = 0; r < SIZE; r++) col.push(board[r][c]);
        lines.push(col);
      }
    }

    const reverse = (dir === 'right' || dir === 'down');

    const newLines = lines.map(line => {
      const src = reverse ? [...line].reverse() : [...line];
      const compact = src.filter(Boolean);
      const out = [];
      for (let i = 0; i < compact.length; i++) {
        if (i + 1 < compact.length && compact[i].value === compact[i + 1].value) {
          const merged = { id: compact[i].id, value: compact[i].value * 2, r: 0, c: 0, merged: true };
          gained += merged.value;
          if (merged.value === 2048 && !won) won = true;
          out.push(merged);
          // The other tile will be dropped (its element removed on render)
          i++;
        } else {
          out.push(compact[i]);
        }
      }
      while (out.length < SIZE) out.push(null);
      return reverse ? out.reverse() : out;
    });

    // Write back with row/col, check if moved
    if (dir === 'left' || dir === 'right') {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const prev = board[r][c];
          const now = newLines[r][c];
          if (!prev && !now) continue;
          if (!prev || !now || prev.id !== now.id || prev.value !== now.value) moved = true;
          if (now) { now.r = r; now.c = c; }
          board[r][c] = now;
        }
      }
    } else {
      for (let c = 0; c < SIZE; c++) {
        for (let r = 0; r < SIZE; r++) {
          const prev = board[r][c];
          const now = newLines[c][r];
          if (!prev && !now) continue;
          if (!prev || !now || prev.id !== now.id || prev.value !== now.value) moved = true;
          if (now) { now.r = r; now.c = c; }
          board[r][c] = now;
        }
      }
    }

    if (moved) {
      score += gained;
      addRandomTile();
      render();
      saveState();
      checkEnd();
    }
  }

  function canMove() {
    if (emptyCells().length) return true;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = board[r][c].value;
        if (c + 1 < SIZE && board[r][c + 1].value === v) return true;
        if (r + 1 < SIZE && board[r + 1][c].value === v) return true;
      }
    }
    return false;
  }

  function checkEnd() {
    if (won && !keepPlaying) {
      overlay.classList.add('show', 'win');
      overlayTitle.textContent = '2048 달성!';
      overlayAction.textContent = '다시 시작';
      overlayKeep.style.display = '';
      return;
    }
    if (!canMove()) {
      overlay.classList.add('show');
      overlay.classList.remove('win');
      overlayTitle.textContent = '게임 오버!';
      overlayAction.textContent = '다시 시작';
      overlayKeep.style.display = 'none';
    }
  }

  function saveState() {
    const simple = board.map(row => row.map(t => t ? t.value : 0));
    try { localStorage.setItem(STATE_KEY, JSON.stringify({ board: simple, score, won, keepPlaying })); } catch (e) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      board = emptyBoard();
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const v = data.board[r][c];
          if (v) board[r][c] = { id: nextId++, value: v, r, c };
        }
      }
      score = data.score || 0;
      won = !!data.won;
      keepPlaying = !!data.keepPlaying;
      return emptyCells().length < SIZE * SIZE;
    } catch (e) { return false; }
  }

  function newGame() {
    board = emptyBoard();
    score = 0;
    won = false;
    keepPlaying = false;
    tileEls.forEach(el => el.remove());
    tileEls.clear();
    addRandomTile();
    addRandomTile();
    overlay.classList.remove('show', 'win');
    render();
    saveState();
  }

  // Input
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); slide('left'); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); slide('right'); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); slide('up'); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); slide('down'); }
    else if (e.key === ' ') { e.preventDefault(); newGame(); }
  });

  // Touch swipe
  const boardWrap = document.getElementById('board-wrap');
  let sx = 0, sy = 0, tracking = false;
  const THRESH = 24;
  boardWrap.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY; tracking = true;
  }, { passive: true });
  boardWrap.addEventListener('touchmove', (e) => {
    if (tracking) e.preventDefault();
  }, { passive: false });
  boardWrap.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    if (Math.abs(dx) < THRESH && Math.abs(dy) < THRESH) return;
    if (Math.abs(dx) > Math.abs(dy)) slide(dx > 0 ? 'right' : 'left');
    else slide(dy > 0 ? 'down' : 'up');
  }, { passive: true });

  newGameBtn.addEventListener('click', newGame);
  overlayAction.addEventListener('click', newGame);
  overlayKeep.addEventListener('click', () => {
    keepPlaying = true;
    overlay.classList.remove('show', 'win');
    saveState();
  });

  // Init
  if (!loadState()) {
    newGame();
  } else {
    render();
  }
})();
</script>
</body>
</html>
